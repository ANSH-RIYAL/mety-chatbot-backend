name: Deploy Backend to Cloud Run

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker --quiet

      - name: Build and Push Docker Image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/mety-chatbot-api .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/mety-chatbot-api

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy mety-chatbot-api \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/mety-chatbot-api \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --max-instances=1 \
            --min-instances=0 \
            --concurrency=10 \
            --memory=512Mi \
            --timeout=15s
